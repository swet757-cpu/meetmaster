services:
  miniapp:
    build:
      context: .
      dockerfile: Dockerfile.miniapp
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-meetmaster}:${POSTGRES_PASSWORD:-change_me}@db:5432/${POSTGRES_DB:-meetmaster}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
